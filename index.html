<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YI BAI</title>

<style>
body {
    margin: 0;
    padding: 80px;
    font-family: Helvetica, Arial, sans-serif;
    background: linear-gradient(180deg, #1a00ff 0%, #0000aa 100%);
    color: #d9d9ff;
}

h1 {
    font-size: 90px;
    font-weight: 900;
}

a {
    color: inherit;
    text-decoration: none;
    cursor: pointer;
}

/* 浮层 */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
}

.overlay-content {
    display: flex;
    height: 100%;
}

.left {
    width: 50%;
    padding: 80px;
}

.left img {
    max-width: 100%;
}

.right {
    width: 50%;
    padding: 80px;
    color: white;
}

.close {
    position: absolute;
    top: 40px;
    right: 60px;
    font-size: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1 onclick="openWork()">
01—&lt;WALKING THE DOG&gt;\\\
</h1>

<div class="overlay" id="work1">

<div class="overlay-content">

<div class="left">
<img src="images/01.jpg">
</div>

<div class="right">
<h2>Walking the Dog (2023)</h2>
<p>
Your text here...
</p>
</div>

</div>

<div class="close" onclick="closeWork()">Close</div>

</div>

<script>
function openWork() {
    document.getElementById("work1").style.display = "block";
}
function closeWork() {
    document.getElementById("work1").style.display = "none";
}
</script>

</body>
</html>
