<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>E.White</title>

<style>
body {
    margin: 0;
    padding: 80px;
    font-family: Helvetica, Arial, sans-serif;
    background: linear-gradient(180deg, #1a00ff 0%, #0000aa 100%);
    color: #d9d9ff;
}

/* 首页标题 */
h1 {
    font-size: 90px;
    font-weight: 900;
    cursor: pointer;
}

/* 左侧图片层 */
.work-panel {
    position: fixed;
    top: 0;
    left: -50%;
    width: 50%;
    height: 100%;
    background: black;
    color: white;
    padding: 80px;
    transition: 0.4s ease;
}

.work-panel img {
    max-width: 100%;
}

.work-panel.active {
    left: 0;
}

/* 右侧文字层 */
.text-panel {
    position: fixed;
    top: 0;
    right: -50%;
    width: 50%;
    height: 100%;
    background: #111;
    color: white;
    padding: 80px;
    transition: 0.4s ease;
}

.text-panel.active {
    right: 0;
}

/* 按钮 */
.btn {
    cursor: pointer;
    font-size: 14px;
    margin-right: 20px;
}
</style>
</head>

<body>

<h1 onclick="openWork()">
08—&lt;THE HILL&gt;///
</h1>

<!-- 左图层 -->
<div class="work-panel" id="work1">

<img src="images/08.jpg">

<br><br>

<div>
<span class="btn" onclick="openText()">More...</span>
<span class="btn" onclick="closeWork()">Close</span>
</div>

</div>

<!-- 右文字层 -->
<div class="text-panel" id="text1">

<h2>The Hill (2023)</h2>

<p>
Two beds gaze at each other from afar.<br>
Upon them, silence lies prone —<br>
a hill that rose from the earth<br>
hundreds of millions of years ago,<br>
yet drifting with the tectonic plates,<br>
can no longer be stitched back together.
</p>

<br><br>

<span class="btn" onclick="closeText()">Close</span>

</div>

<script>
function openWork() {
    document.getElementById("work1").classList.add("active");
}

function closeWork() {
    document.getElementById("work1").classList.remove("active");
    document.getElementById("text1").classList.remove("active");
}

function openText() {
    document.getElementById("text1").classList.add("active");
}

function closeText() {
    document.getElementById("text1").classList.remove("active");
}
</script>

</body>
</html>
